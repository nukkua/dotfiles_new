set -g base-index 1
set -g pane-base-index 1

unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix


bind s select-window -t 1
bind n select-window -t 2
bind t select-window -t 3
bind r select-window -t 4
bind w select-window -t 5


set -g default-terminal "st-256color"
set-option -ga terminal-overrides ",st-256color:Tc"

bind G new-window -n 'lazygit' lazygit
set -g renumber-windows on   
set -g escape-time 0

set -g status-position top
set -g status-justify absolute-centre
set -g status-style 'fg=color7 bg=default'
set -g status-right ''
set -g status-left '#S'
set -g status-left-style 'fg=color8'
set -g status-right-length 0
set -g status-left-length 100
setw -g window-status-current-style 'fg=#ffb6c1 bg=default bold'
setw -g window-status-current-format '#I:#W '
setw -g window-status-style 'fg=color8'
set -g pane-border-style "fg=#ffb6c1"
set -g pane-active-border-style "fg=#ffb6c1"

bind b set-option status

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R   
bind -r m resize-pane -Z

unbind %
bind g split-window -h -c "#{pane_current_path}"


bind R source-file ~/.tmux.conf

bind v copy-mode

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"
bind-key N command-prompt "new-session -s '%%'"
bind T choose-tree -s

# tmux plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/.tmux/plugins/tpm/tpm'
